coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
    patch:
      default:
        target: 90%
        threshold: 0%

ignore:
  - "target/"
  - "tests/"
  - "examples/"
  - "**/*.cargo/"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
