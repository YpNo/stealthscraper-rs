name: Release

# Releases are driven by explicit version tags (e.g. `v0.4.0`):
#   git tag v0.4.0 && git push origin v0.4.0
# The full check pipeline must pass before a GitHub release is created. This
# verifies the crate packages cleanly but does NOT publish to crates.io.
on:
  push:
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  # Gate the release on the same checks a PR must pass.
  checks:
    uses: ./.github/workflows/checks.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: write # create the release and upload notes
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libssl-dev libclang-dev nasm golang-go

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Confirms the package is publishable (build + manifest + include list)
      # without contacting crates.io.
      - name: Verify crate packages cleanly (no publish)
        run: cargo publish --dry-run --all-features

      - name: Create GitHub release
        uses: softprops/action-gh-release@c8dc23ee23904576a4cd7f2979130ca0414916a0 # v2.2.1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
