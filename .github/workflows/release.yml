name: Release

# Releases are driven by explicit version tags (e.g. `v0.4.0`):
#   git tag v0.4.0 && git push origin v0.4.0
# The full check pipeline must pass before a GitHub release is created. This
# verifies the crate packages cleanly but does NOT publish to crates.io.
on:
  push:
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  # Gate the release on the same checks a PR must pass.
  checks:
    uses: ./.github/workflows/checks.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: write # create the release and upload notes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
