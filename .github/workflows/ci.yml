name: Rust CI

on:
  pull_request:
    branches: [ "main", "master"]
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday for security audits

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Lint with Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo clippy
        # We allow dead code during development but deny other warnings
        run: cargo clippy --all-targets --all-features -- -D warnings -A dead_code

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # We need cmake, nasm, and go for boring-sys (BoringSSL build)
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential nasm golang-go

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo test
        run: cargo test --all-features

  security:
    name: Security & License Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  doc:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential nasm golang-go
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Check Documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dependencies for building boring-sys
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential nasm golang-go

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin (binary)
        run: |
          curl -s https://api.github.com/repos/xd009642/tarpaulin/releases/latest | grep browser_download_url | grep x86_64-unknown-linux-musl | cut -d '"' -f 4 | xargs curl -L | tar xz -C /usr/local/bin

      - name: Run cargo-tarpaulin
        run: cargo +nightly tarpaulin --all-features --workspace --timeout 120 --out xml
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          file: cobertura.xml
